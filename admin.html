<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Panel Admin - Goat & Cheese</title>

  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="page-wrapper">

    <header class="admin-header">
      <img src="assets/logo.png" alt="Goat & Cheese" class="admin-logo" />
      <h1>Panel de pedidos</h1>
      <p>Goat & Cheese</p>
      <button id="logout-button" class="logout-button" style="display: none;">
        Cerrar sesión
      </button>
    </header>

    <main>
      <section class="admin-login" id="admin-login">
        <h2>Acceso admin</h2>
        <p>Ingresá el PIN para ver los pedidos.</p>

        <input 
          type="password" 
          id="admin-pin" 
          placeholder="PIN de acceso"
        />

        <button id="admin-login-button" class="main-button">
          Ingresar
        </button>

        <p id="admin-error" class="admin-error"></p>
      </section>
      <section class="admin-section" id="admin-panel" style="display: none;">
        <h2>Pedidos recibidos</h2>
        
        <div class="admin-filters">
          <button onclick="setFilter('Todos')">Todos</button>
          <button onclick="setFilter('Recibido')">Recibido</button>
          <button onclick="setFilter('En preparación')">Preparando</button>
          <button onclick="setFilter('Listo')">Listo</button>
          <button onclick="setFilter('Entregado')">Entregado</button>
        </div>

        <div class="store-controls">

          <h3>Estado del local</h3>

          <div class="store-current-status" id="store-current-status">
            Consultando estado...
          </div>

          <button id="sold-out-button">
            🔴 Activar sin stock
          </button>

          <button id="open-store-button">
            🟢 Volver a vender
          </button>

          <hr class="admin-divider">

          <button id="auto-store-button">
            ⏱️ Usar horario automático
          </button>

          <button id="force-open-button">
            🟢 Forzar abierto
          </button>

          <button id="force-closed-button">
            🔴 Forzar cerrado
          </button>

        </div>

        <div id="orders-container">
          <p>Cargando pedidos...</p>
        </div>
      </section>
    </main>

  </div>

  <div class="admin-toast" id="admin-toast">
    🔥 Nuevo pedido recibido
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="admin.js"></script>
</body>
</html>
